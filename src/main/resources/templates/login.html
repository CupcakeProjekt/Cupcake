            </div>
            <div class="headerImageWrap">
                <img class="headerImage" src="/images/cupcakeHeader.png" th:src="@{/images/cupcakeHeader.png}" alt="Cupcake logo"/>
            </div>
        </header>

        <nav>
            <div class="navLeftWrap">
                <a class="navText" th:href="@{/home-page}">Hjem</a>
                <a class="navText" th:if="${user != null and user.role.name() == 'ADMIN'}" th:href="@{/admin-page}">Kunder</a>
            </div>
            <div  class="navRightWrap">
                <form th:if="${user != null}" method="post" th:action="@{/logout}">
                    <button type="submit" class="navText link-style">Log ud</button>
                </form>
                <p class="navText" th:if="${user != null}" th:text="${user.email}">noreply@cphbusiness.dk</p>
            </div>

        </nav>

        <main>
            <h1 class="form-title">Log ind</h1>
            <form method="post" class="login-form" th:action="@{/login}">

                <div class="loginWrap">
                    <div>
                        <h2 class="login-label" for="email-input">Brugernavn</h2>
                        <input class="login-input" name="email" id="email-input" type="text" placeholder="Indtast email"
                               required/>
                    </div>
                    <div>
                        <h2 class="login-label" for="password-input">Password</h2>
                        <input class="login-input" name="password" id="password-input" type="password" placeholder="Indtast password"
                               required/>
                    </div>
                    </div>
                    <p class="error-msg" th:text="${errorMsg}">Brugernavn eller password forkert</p>
                    <div class="login-link">
                    Ny til Olsker Cupcakes? <a th:href="@{/create-user-page}">Opret bruger</a>
                    </div>
                    <div class="loginBottonWrap">
                        <button class="submit-button" id="submit-button" type="submit">Log ind</button>
                    </div>
                </div>
            </form>
        </main>
    </body>
</html>
